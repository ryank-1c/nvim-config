# ============================================================
# General
# ============================================================
set -g mouse on
set -g pane-base-index 1
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB"
setw -g xterm-keys on

# ============================================================
# Prefix
# ============================================================
unbind C-b
set -g prefix End
bind End send-prefix

# ============================================================
# Pane navigation
# ============================================================
bind 1 select-pane -t:.1
bind 2 select-pane -t:.2
bind 3 select-pane -t:.3
bind 4 select-pane -t:.4
bind 5 select-pane -t:.5
bind -n M-Tab select-pane -t:.+
bind-key L select-layout "e2d1,172x54,0,0{125x54,0,0[125x37,0,0,2,125x16,0,38{67x16,0,38,35,57x16,68,38,36}],46x54,126,0,4}"

# ============================================================
# Pane management
# ============================================================
bind | split-window -h
bind - split-window -v
bind f resize-pane -Z

# ============================================================
# Appearance
# ============================================================
set -g mode-style          "bg=#b3d4ff,fg=#000000"
set -g pane-border-style        fg=#000000
set -g pane-active-border-style fg=#000000,bold
set -g status-style        bg=#e8e8e8,fg=#2c2c2c

# ============================================================
# Plugins
# ============================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# initialize tpm (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
